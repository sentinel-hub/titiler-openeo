name: Lint and Test Charts

on:
  push:
    branches:
    - main
    tags:
    - '*'
    paths:
      # Only run test and docker publish if some code have changed
      - 'deployment/k8s/charts/**'
      - '.github/workflows/check_charts.yaml'
      - 'pyproject.toml'
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check Version
        run: |
          current_version=$(grep '^version = ' pyproject.toml | cut -f2 -d= | tr -d ' ' | tr -d '"')
          app_version=$(grep 'appVersion:' deployment/k8s/charts/Chart.yaml | cut -f2 -d: | tr -d ' ')
          if [[ "$current_version" != "$app_version" ]]; then
            echo "❌ current version from pyproject.toml ($current_version) and appVersion from Chart.yaml ($app_version) differs";
            exit 1;
          fi
          echo "✅ Versions match: $current_version"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          yamale_version: '6.0.0'

      - name: Run helm unittest
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.6.2
          helm unittest deployment/k8s/charts

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --chart-dirs deployment/k8s --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --chart-dirs deployment/k8s --target-branch ${{ github.event.repository.default_branch }} --check-version-increment=false

      - name: Build container
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          # See https://github.com/developmentseed/titiler/discussions/387
          platforms: linux/amd64
          context: .
          file: Dockerfile
          push: false
          tags: "titiler-openeo:dev"

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Load container image in kind cluster
        run: kind load docker-image titiler-openeo:dev --name chart-testing
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        run: ct install --chart-dirs deployment/k8s --helm-extra-args "--timeout=300s" --skip-clean-up
        if: steps.list-changed.outputs.changed == 'true'

      - name: Smoke test health endpoints
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # ct install --skip-clean-up leaves the release in place. Find the
          # pod by the standard helm label (app.kubernetes.io/instance is the
          # release name, name is the chart name).
          for i in $(seq 1 30); do
            POD=$(kubectl get pods -A -l app.kubernetes.io/name=titiler-openeo \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            NS=$(kubectl get pods -A -l app.kubernetes.io/name=titiler-openeo \
              -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || true)
            if [[ -n "$POD" ]]; then
              break
            fi
            sleep 2
          done
          if [[ -z "${POD:-}" ]]; then
            echo "No titiler-openeo pod found in cluster:"
            kubectl get pods -A
            exit 1
          fi
          echo "Smoke-testing pod $NS/$POD"
          kubectl -n "$NS" wait --for=condition=Ready pod/"$POD" --timeout=180s
          kubectl -n "$NS" port-forward "pod/$POD" 18080:80 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT
          # Give kubectl port-forward a moment to establish the tunnel
          for i in $(seq 1 30); do
            curl -fsS -o /dev/null http://127.0.0.1:18080/healthz && break || sleep 1
          done
          echo "GET /healthz"
          curl -fsS http://127.0.0.1:18080/healthz | tee /tmp/healthz.json
          echo "GET /readyz"
          curl -fsS http://127.0.0.1:18080/readyz | tee /tmp/readyz.json
          echo "GET /api"
          curl -fsS -o /dev/null http://127.0.0.1:18080/api
          echo "GET /api.html"
          curl -fsS -o /dev/null http://127.0.0.1:18080/api.html
          echo "GET /.well-known/openeo"
          curl -fsS -o /dev/null http://127.0.0.1:18080/.well-known/openeo

      # End-to-end test for the GitOps sealed-secret pattern.
      # ct install can't natively pre-create a Secret in the test namespace,
      # so this path is driven by a direct `helm install`. See
      # deployment/k8s/charts/tests/sealed-secret-install-values.yaml.
      - name: Sealed-secret postgres install (E2E)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail

          NAMESPACE=sealed-secret-test
          RELEASE=sealed
          # The bitnami subchart creates a Service named "<fullname>-postgresql".
          # With release "sealed" and chart "titiler-openeo" the fullname is
          # "sealed-titiler-openeo" so the service is:
          PG_HOST="${RELEASE}-titiler-openeo-postgresql"
          PG_PASSWORD="seal3d-s3cr3t-p@ss"
          PG_DSN="postgresql://openeo:${PG_PASSWORD}@${PG_HOST}:5432/openeo"

          kubectl create namespace "${NAMESPACE}"

          # Seed the Secret BEFORE install. Both keys live on the same Secret
          # so the bitnami pod (via postgresql.auth.existingSecret) and the
          # app (via envVars.fromSecret) read the same credential.
          kubectl create secret generic pg-creds \
            --namespace "${NAMESPACE}" \
            --from-literal=password="${PG_PASSWORD}" \
            --from-literal=dsn="${PG_DSN}"

          helm install "${RELEASE}" deployment/k8s/charts \
            --namespace "${NAMESPACE}" \
            --values deployment/k8s/charts/tests/sealed-secret-install-values.yaml \
            --wait --timeout 5m

          # Assertion 1: TITILER_OPENEO_STORE_URL must be sourced from a
          # secretKeyRef, not a literal `value:`.
          DEPLOY_YAML=$(kubectl get deployment -n "${NAMESPACE}" "${RELEASE}-titiler-openeo" -o yaml)
          if ! echo "${DEPLOY_YAML}" | grep -B1 -A4 "name: TITILER_OPENEO_STORE_URL" | grep -q "secretKeyRef"; then
            echo "::error::TITILER_OPENEO_STORE_URL is not sourced from a secretKeyRef"
            echo "${DEPLOY_YAML}" | grep -B1 -A4 "name: TITILER_OPENEO_STORE_URL"
            exit 1
          fi

          # Assertion 2: the plaintext password must not appear anywhere in
          # the rendered Deployment manifest.
          if echo "${DEPLOY_YAML}" | grep -q "${PG_PASSWORD}"; then
            echo "::error::Plaintext postgres password leaked into rendered Deployment"
            exit 1
          fi

          # Assertion 3: the app must actually become Ready, which proves the
          # secretKeyRef resolved at runtime and the DSN was valid.
          kubectl wait --namespace "${NAMESPACE}" \
            --for=condition=Available deployment/"${RELEASE}-titiler-openeo" \
            --timeout=2m

          echo "✅ Sealed-secret install passed all assertions."

      - name: Dump diagnostics on sealed-secret install failure
        if: failure() && steps.list-changed.outputs.changed == 'true'
        run: |
          NAMESPACE=sealed-secret-test
          echo "=== Pods ==="
          kubectl get pods -n "${NAMESPACE}" -o wide || true
          echo "=== Events ==="
          kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp || true
          echo "=== App logs ==="
          kubectl logs -n "${NAMESPACE}" -l app.kubernetes.io/name=titiler-openeo --tail=200 || true
          echo "=== Postgres logs ==="
          kubectl logs -n "${NAMESPACE}" -l app.kubernetes.io/name=postgresql --tail=200 || true
