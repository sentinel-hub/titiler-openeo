# Default values for titiler-openeo.

image:
  repository: ghcr.io/sentinel-hub/titiler-openeo
  tag:  # Uses appVersion from Chart.yaml by default
  pullPolicy: IfNotPresent
  command: "uvicorn"
  args:
    - "titiler.openeo.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "80"
    - "--forwarded-allow-ips"   # to make sure it works behind a reverse proxy
    - "*"   # Allow all
    - "--log-config"
    - "/config/log_config.yaml"

nameOverride: ""
fullnameOverride: ""

terminationGracePeriodSeconds: 30

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: titiler.local
      paths: ["/"]
  tls: []
  #  - secretName: titiler-tls
  #    hosts:
  #      - titiler.local

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

replicaCount: 1

extraHostPathMounts:
  []
  # - name: map-sources
  #   mountPath: /map-sources/
  #   hostPath: /home/ubuntu/map-sources
  #   readOnly: false
  #   mountPropagation: HostToContainer # OPTIONAL

imagePullSecrets: []

# Authentication configuration
auth:
  # Authentication method: "basic" or "oidc"
  method: "basic"

  # Basic auth configuration (for testing)
  basic:
    enabled: true
    users:
      - username: "test"
        password: "password"

  # OIDC configuration (for production)
  oidc:
    enabled: false
    clientId: ""
    wellKnownUrl: ""
    redirectUrl: ""
    scopes: "openid email profile"
    nameClaim: "name"
    title: "OIDC"
    description: "OpenID Connect (OIDC) Authorization Code Flow with PKCE"

# STAC configuration
stac:
  apiUrl: "https://stac.eoapi.dev"  # STAC API endpoint URL
  # Virtual bands plugin configuration. Path (relative to the chart) to a JSON
  # file binding virtual band plugins to collections. The referenced plugins
  # must be registered as `titiler.openeo.virtual_bands` entry points in the
  # running image (the built-in examples ship with titiler-openeo; custom
  # plugins require a custom image). Leave empty to disable. Example:
  # files/virtual_bands.json
  virtualBandsConfig: ""

env:
  CPL_TMPDIR: /tmp
  GDAL_CACHEMAX: 200   # 200 mb
  VSI_CACHE: "TRUE"   # Enable VSI cache
  VSI_CACHE_SIZE: 5000000   # 5 MB (per file-handle)
  GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"   # Disable directory listing
  GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"   # Merge consecutive ranges
  GDAL_HTTP_MULTIPLEX: "YES"   # Enable multiplexing
  GDAL_HTTP_VERSION: 2   # Use HTTP/2
  PYTHONWARNINGS: "ignore"

# Additional environment variables from ConfigMaps and Secrets
# Use this to map specific keys from secrets or configmaps to environment variables
envVars:
  fromSecret: []
  # - name: REDIS_PASSWORD           # Environment variable name
  #   secretName: redis-credentials   # Secret name
  #   secretKey: password             # Key in the secret
  # - name: REDIS_HOST
  #   secretName: redis-credentials
  #   secretKey: host
  #
  # GitOps / sealed-secret pattern for the postgres DSN:
  # Inject the full TITILER_OPENEO_STORE_URL connection string from a Secret
  # (e.g. one managed by Sealed Secrets / External Secrets). When this entry
  # is present, the chart skips emitting the helper-built value: env var so
  # the password never ends up in rendered manifests and Helm `lookup` is
  # not required.
  # - name: TITILER_OPENEO_STORE_URL
  #   secretName: titiler-openeo-db
  #   secretKey: dsn
  fromConfigMap: []
  # - name: REDIS_PORT              # Environment variable name
  #   configMapName: redis-config   # ConfigMap name
  #   configMapKey: port            # Key in the configmap

resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 1
    memory: 2Gi

serviceAccountName: ""

nodeSelector: {}

tolerations: []

affinity: {}

# logging configuration
logging:
  configFile: "files/log_config.yaml"

enableTileStore: false
# Bundled single-tenant PostgreSQL (StatefulSet + Service + Secret).
# This is a development / single-tenant convenience. For production with
# multiple replicas or HA, point the chart at an externally-managed
# database via `database.external.*` or by injecting the full DSN via
# `envVars.fromSecret[TITILER_OPENEO_STORE_URL]` (GitOps pattern).
postgresql:
  enabled: false

  image:
    # Official postgres image from the postgres community. Replaces the
    # previous bitnami subchart, whose images moved behind a paid
    # subscription in 2025.
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent

  auth:
    database: openeo
    username: openeo
    # The chart no longer resolves the password from a live Secret via
    # Helm `lookup` (it broke under `helm template` / ArgoCD and produced
    # a fresh random password on every sync). For production, either:
    #  * set this value to a plaintext password (it will appear in
    #    rendered manifests — fine for non-GitOps installs), OR
    #  * leave it empty and point `existingSecret` below at a Secret
    #    containing the password under key `password`. The same Secret
    #    can also hold the full DSN under another key, referenced from
    #    `envVars.fromSecret[TITILER_OPENEO_STORE_URL]`.
    password: "8472387r4_$78-b9"
    # Name of an existing Secret to read the postgres password from.
    # When set, the chart will NOT create its own Secret.
    existingSecret: ""
    # Key inside `existingSecret` that holds the password.
    existingSecretPasswordKey: "password"

  persistence:
    enabled: true
    size: 8Gi
    # Leave empty to use the cluster default StorageClass.
    storageClassName: ""

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Run as the postgres user (uid/gid 70 in the alpine image).
  podSecurityContext:
    fsGroup: 70
  securityContext:
    runAsUser: 70
    runAsNonRoot: true

# Database configuration
database:
  # Type of database to use: "json", "duckdb", "postgresql"
  type: "json"
  # Default services configuration file path
  defaultServices: ""  # Path to default services configuration file (like files/copernicus.json)

  # File-based storage configuration (for JSON and DuckDB)
  persistence:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}
    existingClaim: ""

  # JSON file configuration
  json:
    # Will be used if type is "json"
    enabled: true
    path: "/mnt/data/store.json"
    seed: "files/eoapi.json"   # Initial data to populate the JSON store

  # DuckDB configuration
  duckdb:
    # Will be used if type is "duckdb"
    enabled: false
    path: "/mnt/data/store.db"

  # PostgreSQL connection configuration for an externally-managed database
  # (i.e. not the bundled `postgresql.*` StatefulSet above). Use this when
  # the database lives outside the chart's release — typically a managed
  # service or a shared in-cluster postgres.
  external:
    enabled: false
    host: ""
    port: 5432
    user: openeo
    database: openeo
    # Plaintext password. The chart no longer reads the password from a
    # Secret via Helm `lookup` (incompatible with `helm template` /
    # ArgoCD). For GitOps deployments, leave this empty and inject the
    # full DSN via `envVars.fromSecret[TITILER_OPENEO_STORE_URL]` above,
    # which bypasses this helper entirely.
    password: ""

securityContext:
  {}
  # capabilities:
  #   drop:
  #     - ALL
  # readOnlyRootFilesystem: true
  # allowPrivilegeEscalation: false
  # runAsNonRoot: true
  # runAsUser: 1001

podSecurityContext:
  sysctls:
    - name: net.ipv4.ip_unprivileged_port_start
      value: "0"
  # fsGroup: 1001
  # runAsNonRoot: true
  # runAsUser: 1001
