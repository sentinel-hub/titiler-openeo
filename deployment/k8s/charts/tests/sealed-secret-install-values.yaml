# E2E scenario: GitOps sealed-secret style postgres install.
#
# This file is deliberately NOT under `ci/` so `ct install` does not pick it
# up — it requires a pre-existing Secret (`pg-creds`) in the namespace
# containing both the bitnami subchart password and the full app DSN. The
# Secret is created by the workflow step that drives this install.
#
# What it proves:
#   * The chart helper does NOT inline the password (`postgresql.auth.password`
#     is empty — the helper `fail` path would trigger if invoked).
#   * The Deployment sources TITILER_OPENEO_STORE_URL from `secretKeyRef`.
#   * The bitnami subchart reads its own password from the same Secret
#     via `postgresql.auth.existingSecret`, so app and pod agree.
replicaCount: 1

image:
  repository: titiler-openeo
  tag: dev

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

database:
  type: postgresql

postgresql:
  enabled: true
  auth:
    database: openeo
    username: openeo
    # MUST be empty: the helper-derived DSN must not be invoked. If this is
    # set, the assertions below (plaintext-password leak check) will fail.
    password: ""
    # Bitnami's native mechanism — the postgres pod reads its password
    # from this Secret. The workflow seeds this Secret before install.
    existingSecret: pg-creds
  primary:
    persistence:
      enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

envVars:
  fromSecret:
    # When this entry exists, the chart skips emitting the helper-derived
    # `value:` for TITILER_OPENEO_STORE_URL and uses this secretKeyRef
    # instead — the GitOps path.
    - name: TITILER_OPENEO_STORE_URL
      secretName: pg-creds
      secretKey: dsn
